# =============================================================================
# Higth IoT Monitoring Stack
# Docker Compose overlay for Prometheus, Grafana, and exporters
# Usage: docker compose -f docker-compose.yml -f compose.monitoring.yml up -d
# =============================================================================
#
# Exports collected metrics to Prometheus which are visualized in Grafana.
# All services join the 'highth-network' defined in the main docker-compose.yml.
#
# Services:
#   - Prometheus  (v3.3.0)      : Time-series metrics storage
#   - Grafana     (11.6.0)      : Dashboard visualization
#   - Postgres Exporter (v0.17.1): Exposes PostgreSQL metrics
#   - Redis Exporter    (v1.69.0): Exposes Redis metrics
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: highth-prometheus
    restart: unless-stopped
    networks:
      - highth-network
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.0
    container_name: highth-grafana
    restart: unless-stopped
    networks:
      - highth-network
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-CHANGE_ME_GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-http://localhost:3000}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_INSTALL_PLUGINS: ""
      GF_LOG_LEVEL: info
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL Exporter
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: highth-postgres-exporter
    restart: unless-stopped
    networks:
      - highth-network
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: postgres://sensor_user:${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD}@highth-postgres:5432/sensor_db?sslmode=disable
      PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
      PG_EXPORTER_DISABLE_SETTINGS_METRICS: "false"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
      PG_EXPORTER_EXCLUDE_DATABASES: "template0,template1"
    # depends_on:
    #   highth-postgres:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9187/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Redis Exporter
  # ---------------------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:v1.69.0
    container_name: highth-redis-exporter
    restart: unless-stopped
    networks:
      - highth-network
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://highth-redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}
      REDIS_EXPORTER_CHECK_KEYS: ""
      REDIS_EXPORTER_SCRAPE_ON_START: "true"
      REDIS_EXPORTER_LOG_FORMAT: "txt"
    # depends_on:
    #   highth-redis:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9121/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# =============================================================================
# Networks
# =============================================================================
networks:
  highth-network:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  prometheus-data:
    name: highth-prometheus-data
  grafana-data:
    name: highth-grafana-data
