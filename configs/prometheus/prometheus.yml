global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - 'alerts/*.yml'

scrape_configs:
  - job_name: 'highth-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'highth-postgres'
    static_configs:
      - targets: ['highth-postgres-exporter:9187']
    scrape_interval: 10s

  - job_name: 'highth-redis'
    static_configs:
      - targets: ['highth-redis-exporter:9121']
    scrape_interval: 10s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
    scrape_interval: 5s
