# =============================================================================
# High-Throughput PostgreSQL + Golang Stack
# Docker Compose Configuration
# =============================================================================
# This is a complete Docker setup for a high-throughput system achieving
# ≤500ms median latency for exact-ID queries.
#
# Components:
# - PostgreSQL 16 with optimized configuration
# - Redis 7 for caching
# - Golang API service (replace with your actual API service)
#
# Performance: 50M+ rows, sub-10ms median latency with cache hits
# =============================================================================

version: '3.8'

services:
  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: highth-postgres
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c work_mem=16MB
      -c maintenance_work_mem=1GB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - highth-network
    restart: unless-stopped

  # =============================================================================
  # Redis Cache
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: highth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - highth-network
    restart: unless-stopped

  # =============================================================================
  # Golang API Service
  # =============================================================================
  # Replace this with your actual API service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: highth-api
    environment:
      # Database connection
      DATABASE_URL: postgres://app_user:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/app_db?sslmode=disable

      # Redis connection
      REDIS_URL: redis://redis:6379

      # Cache configuration
      CACHE_ENABLED: "true"
      CACHE_TTL: "30"

      # Database connection pool
      DB_MAX_CONNECTIONS: "50"
      DB_MIN_CONNECTIONS: "10"
      DB_MAX_CONN_LIFETIME: "1h"
      DB_MAX_CONN_IDLE_TIME: "10m"
      DB_HEALTH_CHECK_PERIOD: "30s"

      # API server
      PORT: "8080"
      HOST: "0.0.0.0"

      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - highth-network
    restart: unless-stopped

# =============================================================================
  # PgBouncer (Optional - for production connection pooling)
  # =============================================================================
  # Uncomment this service for production deployments with multiple
  # API instances sharing a single database.
  #
  # pgbouncer:
  #   image: pgbouncer/pgbouncer:latest
  #   container_name: highth-pgbouncer
  #   environment:
  #     DATABASES_HOST: postgres
  #     DATABASES_PORT: 5432
  #     DATABASES_USER: app_user
  #     DATABASES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
  #     DATABASES_DBNAME: app_db
  #     POOL_MODE: transaction
  #     MAX_CLIENT_CONN: 1000
  #     DEFAULT_POOL_SIZE: 50
  #     MIN_POOL_SIZE: 10
  #   ports:
  #     - "6432:6432"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - highth-network
  #   restart: unless-stopped

# =============================================================================
  # Grafana (Optional - for metrics visualization)
  # =============================================================================
  # Uncomment for monitoring and metrics visualization.
  #
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: highth-grafana
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
  #   volumes:
  #     - grafana_data:/var/lib/grafana
  #   networks:
  #     - highth-network
  #   restart: unless-stopped

# =============================================================================
  # Prometheus (Optional - for metrics collection)
  # =============================================================================
  # Uncomment for metrics collection and alerting.
  #
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: highth-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus_data:/prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #   networks:
  #     - highth-network
  #   restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  # grafana_data:
  #   driver: local
  # prometheus_data:
  #   driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  highth-network:
    driver: bridge

# =============================================================================
# Usage Instructions
# =============================================================================
#
# 1. Start the stack:
#    docker-compose up -d
#
# 2. Check service health:
#    docker-compose ps
#    curl http://localhost:8080/health
#
# 3. View logs:
#    docker-compose logs -f api
#
# 4. Stop the stack:
#    docker-compose down
#
# 5. Stop with volumes:
#    docker-compose down -v
#
# =============================================================================
# Environment Variables
# =============================================================================
#
# Create a .env file in the same directory:
#
# POSTGRES_PASSWORD=secure_password_here
# ENVIRONMENT=development
# GRAFANA_PASSWORD=admin
#
# =============================================================================
