version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: highth-postgres
    environment:
      POSTGRES_DB: sensor_db
      POSTGRES_USER: sensor_user
      POSTGRES_PASSWORD: sensor_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=2GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensor_user -d sensor_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - highth-network

  redis:
    image: redis:7-alpine
    container_name: highth-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - highth-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: highth-api
    dns:
      - 127.0.0.11
    environment:
      DATABASE_URL: postgres://sensor_user:sensor_password@postgres:5432/sensor_db?sslmode=disable
      REDIS_URL: redis://redis:6379
      CACHE_ENABLED: "true"
      CACHE_TTL: "30"
      DB_MAX_CONNECTIONS: "50"
      DB_MIN_CONNECTIONS: "10"
      DB_MAX_CONN_LIFETIME: "1h"
      DB_MAX_CONN_IDLE_TIME: "10m"
      DB_HEALTH_CHECK_PERIOD: "30s"
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - highth-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  highth-network:
    driver: bridge
