services:
  postgres:
    image: postgres:16-alpine
    container_name: highth-postgres
    environment:
      POSTGRES_DB: sensor_db
      POSTGRES_USER: sensor_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sensor_password}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c work_mem=16MB
      -c maintenance_work_mem=1GB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=8
      -c bgwriter_delay=200ms
      -c bgwriter_lru_maxpages=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensor_user -d sensor_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - highth-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: highth-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --maxclients 10000
      --tcp-keepalive 60
      --timeout 300
      --hz 100
      --tcp-backlog 511
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - highth-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: highth-api
    dns:
      - 127.0.0.11
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://sensor_user:${POSTGRES_PASSWORD:-sensor_password}@postgres:5432/sensor_db?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-50}
      DB_MIN_CONNECTIONS: ${DB_MIN_CONNECTIONS:-10}
      DB_MAX_CONN_LIFETIME: ${DB_MAX_CONN_LIFETIME:-1h}
      DB_MAX_CONN_IDLE_TIME: ${DB_MAX_CONN_IDLE_TIME:-10m}
      DB_HEALTH_CHECK_PERIOD: ${DB_HEALTH_CHECK_PERIOD:-30s}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_TTL: ${REDIS_TTL:-30s}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-50}
      REDIS_MIN_IDLE_CONNS: ${REDIS_MIN_IDLE_CONNS:-10}
      REDIS_MAX_IDLE_CONNS: ${REDIS_MAX_IDLE_CONNS:-50}
      REDIS_CONN_MAX_IDLE_TIME: ${REDIS_CONN_MAX_IDLE_TIME:-5m}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30s}
      PORT: ${PORT:-8080}
      HOST: ${HOST:-0.0.0.0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - highth-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  highth-network:
    driver: bridge
    external: true
